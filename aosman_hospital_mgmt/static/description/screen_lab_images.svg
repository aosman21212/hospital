  <text x="530" y="219" font-family="Arial" font-size="11" font-weight="bold" fill="#6c757d">Name</text>
  <text x="720" y="219" font-family="Arial" font-size="11" font-weight="bold" fill="#6c757d">Note</text>
  <line x1="390" y1="230" x2="876" y2="230" stroke="#dee2e6" stroke-width="1"/>

  <!-- Image row 1 -->
  <rect x="390" y="230" width="486" height="54" fill="#ffffff"/>
  <rect x="400" y="235" width="52" height="42" rx="3" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <ellipse cx="426" cy="256" rx="20" ry="16" fill="#2d5f8a" opacity="0.7"/>
  <text x="530" y="255" font-family="Arial" font-size="12" fill="#212529">Lateral View</text>
  <text x="530" y="270" font-family="Arial" font-size="11" fill="#6c757d">chest_lateral.jpg</text>
  <text x="720" y="260" font-family="Arial" font-size="11" fill="#6c757d">Right lateral</text>
  <line x1="390" y1="284" x2="876" y2="284" stroke="#dee2e6" stroke-width="1"/>

  <!-- Image row 2 -->
  <rect x="390" y="284" width="486" height="54" fill="#f8f9fa"/>
  <rect x="400" y="289" width="52" height="42" rx="3" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <!-- CT scan mockup thumbnail -->
  <circle cx="426" cy="310" r="18" fill="#1e4060" stroke="#4a90d9" stroke-width="1"/>
  <circle cx="426" cy="310" r="10" fill="#2d6090" opacity="0.6"/>
  <text x="530" y="309" font-family="Arial" font-size="12" fill="#212529">CT Scan Axial</text>
  <text x="530" y="324" font-family="Arial" font-size="11" fill="#6c757d">ct_axial_slice14.jpg</text>
  <text x="720" y="315" font-family="Arial" font-size="11" fill="#6c757d">Slice 14/28</text>
  <line x1="390" y1="338" x2="876" y2="338" stroke="#dee2e6" stroke-width="1"/>

  <!-- Image row 3 -->
  <rect x="390" y="338" width="486" height="54" fill="#ffffff"/>
  <rect x="400" y="343" width="52" height="42" rx="3" fill="#101820" stroke="#555" stroke-width="1"/>
  <text x="426" y="369" font-family="Arial" font-size="8" fill="#7fbfff" text-anchor="middle">ECG</text>
  <polyline points="404,362 410,362 413,350 416,374 419,345 422,374 426,362 450,362" fill="none" stroke="#52be80" stroke-width="1.2"/>
  <text x="530" y="363" font-family="Arial" font-size="12" fill="#212529">ECG Trace</text>
  <text x="530" y="378" font-family="Arial" font-size="11" fill="#6c757d">ecg_20260508.png</text>
  <text x="720" y="370" font-family="Arial" font-size="11" fill="#6c757d">12-lead ECG</text>
  <line x1="390" y1="392" x2="876" y2="392" stroke="#dee2e6" stroke-width="1"/>

  <!-- Add row button -->
  <text x="400" y="415" font-family="Arial" font-size="12" fill="#1a5276">+ Add a line</text>

  <!-- Gallery thumbnails section -->
  <text x="24" y="478" font-family="Arial" font-size="12" fill="#6c757d">🖼  Gallery</text>

  <!-- Thumbnail strip -->
  <rect x="24"  y="488" width="72" height="56" rx="4" fill="#1a1a2e" stroke="#4a90d9" stroke-width="2"/>
  <ellipse cx="60" cy="516" rx="28" ry="22" fill="#2d5f8a" opacity="0.7"/>

  <rect x="106" y="488" width="72" height="56" rx="4" fill="#0d1b2a" stroke="#dee2e6" stroke-width="1"/>
  <circle cx="142" cy="516" r="22" fill="#1e4060" stroke="#4a90d9" stroke-width="1"/>

  <rect x="188" y="488" width="72" height="56" rx="4" fill="#101820" stroke="#dee2e6" stroke-width="1"/>
  <polyline points="194,516 200,516 204,504 208,528 212,499 216,528 220,516 258,516" fill="none" stroke="#52be80" stroke-width="1.5"/>
