  <!-- Ribs -->
  <path d="M100 220 Q150 210 194 218 Q238 210 288 220" fill="none" stroke="#8faec8" stroke-width="1.5" opacity="0.7"/>
  <path d="M94 238 Q150 226 194 234 Q238 226 294 238" fill="none" stroke="#8faec8" stroke-width="1.5" opacity="0.7"/>
  <path d="M90 256 Q150 244 194 252 Q238 244 298 256" fill="none" stroke="#8faec8" stroke-width="1.5" opacity="0.7"/>
  <path d="M88 274 Q150 262 194 270 Q238 262 300 274" fill="none" stroke="#8faec8" stroke-width="1.5" opacity="0.7"/>
  <path d="M88 292 Q150 280 194 288 Q238 280 300 292" fill="none" stroke="#8faec8" stroke-width="1.5" opacity="0.7"/>
  <!-- Spine -->
  <rect x="188" y="175" width="12" height="210" rx="3" fill="#8faec8" opacity="0.5"/>
  <!-- Lungs -->
  <ellipse cx="155" cy="275" rx="45" ry="65" fill="#2d5f8a" opacity="0.4"/>
  <ellipse cx="233" cy="275" rx="45" ry="65" fill="#2d5f8a" opacity="0.4"/>
