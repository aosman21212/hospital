<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="hdr2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#1f618d"/>
    </linearGradient>
    <linearGradient id="xray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="bone" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8e4f0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8faec8" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Window chrome -->
  <rect width="900" height="520" rx="10" fill="#f0f0f0"/>
  <rect width="900" height="42" rx="10" fill="#2c3e50"/>
  <rect y="32" width="900" height="10" fill="#2c3e50"/>
  <circle cx="20" cy="21" r="7" fill="#e74c3c"/>
  <circle cx="42" cy="21" r="7" fill="#f39c12"/>
  <circle cx="64" cy="21" r="7" fill="#2ecc71"/>
  <text x="450" y="26" font-family="Arial" font-size="13" fill="#aaa" text-anchor="middle">Odoo 19 — Lab Test Images &amp; Scans</text>

