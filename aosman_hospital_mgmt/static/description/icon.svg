<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="140" height="140" rx="28" fill="url(#bgGrad)"/>

  <!-- Subtle top shine -->
  <ellipse cx="70" cy="28" rx="55" ry="20" fill="#ffffff" opacity="0.07"/>

  <!-- Hospital building silhouette -->
  <rect x="22" y="60" width="96" height="64" rx="4" fill="#ffffff" opacity="0.10"/>
  <rect x="35" y="74" width="18" height="14" rx="2" fill="#ffffff" opacity="0.25"/>
  <rect x="62" y="74" width="18" height="14" rx="2" fill="#ffffff" opacity="0.25"/>
  <rect x="89" y="74" width="18" height="14" rx="2" fill="#ffffff" opacity="0.25"/>
  <!-- Door -->
  <rect x="55" y="96" width="32" height="28" rx="2" fill="#1a5276" opacity="0.6"/>

  <!-- Red cross shield -->
  <rect x="42" y="10" width="56" height="58" rx="12" fill="#c0392b"/>
  <!-- Cross arms white -->
  <rect x="62" y="20" width="16" height="38" rx="4" fill="#ffffff"/>
  <rect x="50" y="32" width="40" height="16" rx="4" fill="#ffffff"/>

  <!-- Heartbeat line -->
  <polyline points="14,128 28,128 33,120 40,136 47,114 54,136 59,128 126,128"
            fill="none" stroke="#52be80" stroke-width="2.8"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
</svg>
